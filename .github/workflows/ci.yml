name: CI
on:
  push: { branches: [main, master] }
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # No version input: action-setup reads the pinned `packageManager`
      # field from package.json (pnpm@10.28.1). Specifying both throws
      # ERR_PNPM_BAD_PM_VERSION when they differ.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Build first: cross-package typecheck resolves each package's emitted
      # .d.ts (e.g. @kv/cli depends on @kv/core's declarations).
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm typecheck:e2e
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:e2e
